<!DOCTYPE html>
<html lang="en">
<head>
    <title>EcoGrid Setup</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .hidden { display: none; }
        select option {
            background-color: #1f2937;
            color: white;
        }
        select {
            background-color: rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
        }
        input {
            background-color: rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.7) !important;
        }
        #map {
            height: 400px;
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }
        .map-button {
            background: linear-gradient(45deg, #10b981, #059669);
            transition: all 0.3s ease;
        }
        .map-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">⚙️ EcoGrid System Setup</h1>
            <p class="text-xl text-gray-200">Configure your renewable energy system</p>
        </header>

        <!-- Quick Actions -->
        <div class="max-w-2xl mx-auto mb-6">
            <div class="flex gap-4 justify-center">
                <button onclick="showMap()" class="bg-green-500 hover:bg-green-600 px-6 py-3 rounded-lg font-semibold transition-colors text-white">
                    📍 Select Location on Map
                </button>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="max-w-2xl mx-auto mb-8">
            <div class="flex justify-between items-center">
                <div class="flex-1">
                    <div class="h-2 bg-gray-300 rounded-full">
                        <div id="progress-bar" class="h-2 bg-blue-500 rounded-full transition-all duration-300" style="width: 20%"></div>
                    </div>
                </div>
                <span id="step-indicator" class="ml-4 text-white font-semibold">Step 1 of 5</span>
            </div>
        </div>

        <!-- Step 1: Location Parameters -->
        <div id="step1" class="max-w-2xl mx-auto">
            <div class="glass-effect rounded-xl p-8 text-white">
                <h2 class="text-2xl font-bold mb-6">📍 Location Parameters</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Latitude</label>
                        <div class="flex gap-2">
                            <select id="latitude" class="flex-1 bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                                <option value="">Select Location</option>
                                <option value="13.0717">Chennai, India (13.07°N)</option>
                                <option value="28.6139">New Delhi, India (28.61°N)</option>
                                <option value="19.0760">Mumbai, India (19.08°N)</option>
                                <option value="12.9716">Bangalore, India (12.97°N)</option>
                                <option value="22.5726">Kolkata, India (22.57°N)</option>
                                <option value="17.3850">Hyderabad, India (17.39°N)</option>
                                <option value="26.9124">Pune, India (26.91°N)</option>
                                <option value="custom">Custom Latitude</option>
                            </select>
                            <button onclick="showMap()" class="map-button px-4 py-2 rounded-lg text-white font-semibold" title="Select Location from Map">
                                �️ Map
                            </button>
                        </div>
                        <input id="latitude-custom" type="number" step="0.0001" placeholder="Enter custom latitude" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white mt-2 hidden">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Longitude</label>
                        <div class="flex gap-2">
                            <select id="longitude" class="flex-1 bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                                <option value="">Select Location</option>
                                <option value="80.1994">Chennai, India (80.20°E)</option>
                                <option value="77.2090">New Delhi, India (77.21°E)</option>
                                <option value="72.8777">Mumbai, India (72.88°E)</option>
                                <option value="77.5946">Bangalore, India (77.59°E)</option>
                                <option value="88.3639">Kolkata, India (88.36°E)</option>
                                <option value="78.4867">Hyderabad, India (78.49°E)</option>
                                <option value="73.8563">Pune, India (73.86°E)</option>
                                <option value="custom">Custom Longitude</option>
                            </select>
                            <button onclick="showMap()" class="map-button px-4 py-2 rounded-lg text-white font-semibold" title="Select Location from Map">
                                �️ Map
                            </button>
                        </div>
                        <input id="longitude-custom" type="number" step="0.0001" placeholder="Enter custom longitude" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white mt-2 hidden">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Altitude (meters)</label>
                        <div class="flex gap-2">
                            <select id="altitude" class="flex-1 bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                                <option value="">Select Altitude</option>
                                <option value="6.7">Chennai (6.7m)</option>
                                <option value="216">New Delhi (216m)</option>
                                <option value="14">Mumbai (14m)</option>
                                <option value="920">Bangalore (920m)</option>
                                <option value="9">Kolkata (9m)</option>
                                <option value="505">Hyderabad (505m)</option>
                                <option value="560">Pune (560m)</option>
                                <option value="custom">Custom Altitude</option>
                            </select>
                            <button onclick="getAltitude()" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg text-white font-semibold transition-colors" title="Get Altitude from GPS">
                                🏔️ Alt
                            </button>
                        </div>
                        <input id="altitude-custom" type="number" placeholder="Enter custom altitude" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white mt-2 hidden">
                    </div>
                    
                    <!-- Map Container -->
                    <div class="md:col-span-2">
                        <div id="map-container" class="hidden">
                            <label class="block text-sm font-medium mb-2">📍 Select Location on Map</label>
                            <div id="map"></div>
                            <div class="mt-2 flex gap-2">
                                <button onclick="confirmMapLocation()" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-lg text-white font-semibold transition-colors">
                                    ✅ Confirm Location
                                </button>
                                <button onclick="hideMap()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-white font-semibold transition-colors">
                                    ❌ Cancel
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Installation Type</label>
                        <select id="installation_type" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="urban">🏙️ Urban</option>
                            <option value="rural">🌾 Rural</option>
                            <option value="coastal">🏖️ Coastal</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Terrain Type</label>
                        <select id="terrain_type" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="flat">📏 Flat</option>
                            <option value="hill">⛰️ Hill</option>
                            <option value="rooftop">🏠 Rooftop</option>
                        </select>
                    </div>
                </div>
                
                <button onclick="nextStep(2)" class="mt-6 bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-lg font-semibold transition-colors">
                    Next Step →
                </button>
            </div>
        </div>

        <!-- Step 2: Solar System -->
        <div id="step2" class="max-w-2xl mx-auto hidden">
            <div class="glass-effect rounded-xl p-8 text-white">
                <h2 class="text-2xl font-bold mb-6">☀️ Solar System</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Panel Model</label>
                        <select id="panel_model" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Panel</option>
                            <option value="monocrystalline">Monocrystalline Silicon</option>
                            <option value="polycrystalline">Polycrystalline Silicon</option>
                            <option value="thin_film">Thin Film</option>
                            <option value="bifacial">Bifacial</option>
                            <option value="perovskite">Perovskite</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Panel Count</label>
                        <select id="panel_count" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Count</option>
                            <option value="10">10 panels (Small)</option>
                            <option value="20">20 panels (Medium)</option>
                            <option value="30">30 panels (Large)</option>
                            <option value="50">50 panels (Industrial)</option>
                            <option value="100">100 panels (Commercial)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Panel Power (Watts)</label>
                        <select id="panel_power" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Power</option>
                            <option value="300">300W</option>
                            <option value="350">350W</option>
                            <option value="400">400W</option>
                            <option value="450">450W</option>
                            <option value="500">500W</option>
                            <option value="550">550W</option>
                            <option value="600">600W</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Panel Efficiency (%)</label>
                        <select id="panel_efficiency" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Efficiency</option>
                            <option value="17">17% (Standard)</option>
                            <option value="19">19% (Good)</option>
                            <option value="21">21% (High)</option>
                            <option value="23">23% (Premium)</option>
                            <option value="25">25% (Ultra Premium)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Tilt Angle (degrees)</label>
                        <select id="tilt_angle" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Tilt</option>
                            <option value="10">10° (Flat)</option>
                            <option value="15">15° (Low)</option>
                            <option value="30">30° (Optimal)</option>
                            <option value="45">45° (High)</option>
                            <option value="60">60° (Steep)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Azimuth Angle (degrees)</label>
                        <select id="azimuth_angle" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Direction</option>
                            <option value="0">0° (North)</option>
                            <option value="90">90° (East)</option>
                            <option value="180">180° (South - Optimal)</option>
                            <option value="270">270° (West)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Installation Type</label>
                        <select id="solar_installation" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="rooftop">🏠 Rooftop</option>
                            <option value="ground">🌱 Ground</option>
                            <option value="carport">🚗 Carport</option>
                            <option value="floating">💧 Floating</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Inverter Efficiency (%)</label>
                        <select id="inverter_efficiency" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Efficiency</option>
                            <option value="95">95% (Standard)</option>
                            <option value="97">97% (Good)</option>
                            <option value="98">98% (High)</option>
                            <option value="99">99% (Premium)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">System Loss (%)</label>
                        <select id="system_loss" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Loss</option>
                            <option value="5">5% (Excellent)</option>
                            <option value="10">10% (Good)</option>
                            <option value="15">15% (Average)</option>
                            <option value="20">20% (Poor)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Shading Factor (%)</label>
                        <select id="shading_factor" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Shading</option>
                            <option value="0">0% (No Shading)</option>
                            <option value="10">10% (Minimal)</option>
                            <option value="25">25% (Moderate)</option>
                            <option value="50">50% (Heavy)</option>
                        </select>
                    </div>
                </div>
                
                <div class="flex gap-4 mt-6">
                    <button onclick="nextStep(1)" class="bg-gray-500 hover:bg-gray-600 px-6 py-3 rounded-lg font-semibold transition-colors">
                        ← Previous
                    </button>
                    <button onclick="nextStep(3)" class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-lg font-semibold transition-colors">
                        Next Step →
                    </button>
                </div>
            </div>
        </div>

        <!-- Step 3: Wind System -->
        <div id="step3" class="max-w-2xl mx-auto hidden">
            <div class="glass-effect rounded-xl p-8 text-white">
                <h2 class="text-2xl font-bold mb-6">💨 Wind System</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Turbine Model</label>
                        <select id="turbine_model" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Turbine</option>
                            <option value="small">Small Residential (1-5kW)</option>
                            <option value="medium">Medium Commercial (10-50kW)</option>
                            <option value="large">Large Industrial (100kW+)</option>
                            <option value="micro">Micro Turbine (<1kW)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Turbine Count</label>
                        <select id="turbine_count" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Count</option>
                            <option value="1">1 Turbine</option>
                            <option value="2">2 Turbines</option>
                            <option value="3">3 Turbines</option>
                            <option value="5">5 Turbines</option>
                            <option value="10">10 Turbines</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Rated Power (kW)</label>
                        <select id="rated_power" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Power</option>
                            <option value="1">1 kW</option>
                            <option value="2.5">2.5 kW</option>
                            <option value="5">5 kW</option>
                            <option value="10">10 kW</option>
                            <option value="20">20 kW</option>
                            <option value="50">50 kW</option>
                            <option value="100">100 kW</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Cut-in Speed (m/s)</label>
                        <select id="cut_in_speed" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Speed</option>
                            <option value="2">2 m/s (Low)</option>
                            <option value="3">3 m/s (Standard)</option>
                            <option value="4">4 m/s (High)</option>
                            <option value="5">5 m/s (Very High)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Cut-out Speed (m/s)</label>
                        <select id="cut_out_speed" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Speed</option>
                            <option value="20">20 m/s</option>
                            <option value="25">25 m/s</option>
                            <option value="30">30 m/s</option>
                            <option value="35">35 m/s</option>
                            <option value="40">40 m/s</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Hub Height (meters)</label>
                        <select id="hub_height" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Height</option>
                            <option value="10">10 m (Small)</option>
                            <option value="20">20 m (Medium)</option>
                            <option value="30">30 m (Large)</option>
                            <option value="50">50 m (Industrial)</option>
                            <option value="80">80 m (Utility)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Rotor Diameter (meters)</label>
                        <select id="rotor_diameter" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Diameter</option>
                            <option value="2">2 m (Micro)</option>
                            <option value="5">5 m (Small)</option>
                            <option value="10">10 m (Medium)</option>
                            <option value="20">20 m (Large)</option>
                            <option value="50">50 m (Industrial)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Turbine Efficiency (%)</label>
                        <select id="turbine_efficiency" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Efficiency</option>
                            <option value="35">35% (Betz Limit)</option>
                            <option value="40">40% (Good)</option>
                            <option value="45">45% (Excellent)</option>
                            <option value="50">50% (Premium)</option>
                        </select>
                    </div>
                </div>
                
                <div class="flex gap-4 mt-6">
                    <button onclick="nextStep(2)" class="bg-gray-500 hover:bg-gray-600 px-6 py-3 rounded-lg font-semibold transition-colors">
                        ← Previous
                    </button>
                    <button onclick="nextStep(4)" class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-lg font-semibold transition-colors">
                        Next Step →
                    </button>
                </div>
            </div>
        </div>

        <!-- Step 4: Battery Storage -->
        <div id="step4" class="max-w-2xl mx-auto hidden">
            <div class="glass-effect rounded-xl p-8 text-white">
                <h2 class="text-2xl font-bold mb-6">🔋 Battery Storage</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Battery Capacity (kWh)</label>
                        <select id="battery_capacity" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Capacity</option>
                            <option value="5">5 kWh (Small)</option>
                            <option value="10">10 kWh (Medium)</option>
                            <option value="13.5">13.5 kWh (Large)</option>
                            <option value="20">20 kWh (Extra Large)</option>
                            <option value="50">50 kWh (Commercial)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Battery Voltage</label>
                        <select id="battery_voltage" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Voltage</option>
                            <option value="12">12V (Small)</option>
                            <option value="24">24V (Medium)</option>
                            <option value="48">48V (Large)</option>
                            <option value="400">400V (Commercial)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Charge Efficiency (%)</label>
                        <select id="charge_efficiency" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Efficiency</option>
                            <option value="90">90% (Standard)</option>
                            <option value="95">95% (Good)</option>
                            <option value="98">98% (High)</option>
                            <option value="99">99% (Premium)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Discharge Efficiency (%)</label>
                        <select id="discharge_efficiency" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Efficiency</option>
                            <option value="90">90% (Standard)</option>
                            <option value="95">95% (Good)</option>
                            <option value="98">98% (High)</option>
                            <option value="99">99% (Premium)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Max Discharge Rate (kW)</label>
                        <select id="max_discharge_rate" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Rate</option>
                            <option value="3">3 kW</option>
                            <option value="5">5 kW</option>
                            <option value="7">7 kW</option>
                            <option value="10">10 kW</option>
                            <option value="15">15 kW</option>
                        </select>
                    </div>
                </div>
                
                <div class="flex gap-4 mt-6">
                    <button onclick="nextStep(3)" class="bg-gray-500 hover:bg-gray-600 px-6 py-3 rounded-lg font-semibold transition-colors">
                        ← Previous
                    </button>
                    <button onclick="nextStep(5)" class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-lg font-semibold transition-colors">
                        Next Step →
                    </button>
                </div>
            </div>
        </div>

        <!-- Step 5: Energy Consumption -->
        <div id="step5" class="max-w-2xl mx-auto hidden">
            <div class="glass-effect rounded-xl p-8 text-white">
                <h2 class="text-2xl font-bold mb-6">⚡ Energy Consumption</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Daily Energy Usage (kWh)</label>
                        <select id="daily_energy_usage" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Usage</option>
                            <option value="10">10 kWh (Small Home)</option>
                            <option value="20">20 kWh (Medium Home)</option>
                            <option value="30">30 kWh (Large Home)</option>
                            <option value="50">50 kWh (Small Business)</option>
                            <option value="100">100 kWh (Medium Business)</option>
                            <option value="500">500 kWh (Large Business)</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Peak Load (kW)</label>
                        <select id="peak_load" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Peak Load</option>
                            <option value="3">3 kW</option>
                            <option value="5">5 kW</option>
                            <option value="7">7 kW</option>
                            <option value="10">10 kW</option>
                            <option value="15">15 kW</option>
                            <option value="20">20 kW</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Critical Load (kW)</label>
                        <select id="critical_load" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="">Select Critical Load</option>
                            <option value="1">1 kW</option>
                            <option value="2">2 kW</option>
                            <option value="3">3 kW</option>
                            <option value="5">5 kW</option>
                            <option value="10">10 kW</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Load Profile Type</label>
                        <select id="load_profile_type" class="w-full bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white">
                            <option value="residential">🏠 Residential</option>
                            <option value="industrial">🏭 Industrial</option>
                            <option value="commercial">🏢 Commercial</option>
                            <option value="agricultural">🌾 Agricultural</option>
                        </select>
                    </div>
                </div>
                
                <div class="flex gap-4 mt-6">
                    <button onclick="nextStep(4)" class="bg-gray-500 hover:bg-gray-600 px-6 py-3 rounded-lg font-semibold transition-colors">
                        ← Previous
                    </button>
                    <button onclick="submitSetup()" class="bg-green-500 hover:bg-green-600 px-6 py-3 rounded-lg font-semibold transition-colors">
                        🚀 Generate Forecast →
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Handle custom input fields
        document.getElementById('latitude').addEventListener('change', function() {
            const customInput = document.getElementById('latitude-custom');
            if (this.value === 'custom') {
                customInput.classList.remove('hidden');
            } else {
                customInput.classList.add('hidden');
                customInput.value = '';
            }
        });

        document.getElementById('longitude').addEventListener('change', function() {
            const customInput = document.getElementById('longitude-custom');
            if (this.value === 'custom') {
                customInput.classList.remove('hidden');
            } else {
                customInput.classList.add('hidden');
                customInput.value = '';
            }
        });

        document.getElementById('altitude').addEventListener('change', function() {
            const customInput = document.getElementById('altitude-custom');
            if (this.value === 'custom') {
                customInput.classList.remove('hidden');
            } else {
                customInput.classList.add('hidden');
                customInput.value = '';
            }
        });

        // Update progress bar
        function updateProgress(step) {
            const progressBar = document.getElementById('progress-bar');
            const stepIndicator = document.getElementById('step-indicator');
            const progress = (step / 5) * 100;
            progressBar.style.width = progress + '%';
            stepIndicator.textContent = `Step ${step} of 5`;
        }

        // Check for URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const loginSuccess = urlParams.get('login_success');
        const startStep = urlParams.get('step');
        
        // If login was successful and step=location, go to step 1 (location)
        if (loginSuccess === 'true' && startStep === 'location') {
            // Initialize map first
            setTimeout(() => {
                nextStep(1); // Go to location step
            }, 500);
        }

        // Override nextStep function to update progress
        const originalNextStep = window.nextStep;
        window.nextStep = function(step) {
            // Call original function
            if (originalNextStep) {
                originalNextStep(step);
            }
            // Update progress
            updateProgress(step);
        };

        // OpenStreetMap Functions
        let map = null;
        let marker = null;
        let selectedLat = null;
        let selectedLng = null;

        function showMap() {
            document.getElementById('map-container').classList.remove('hidden');
            
            if (!map) {
                // Initialize map centered on India
                map = L.map('map').setView([20.5937, 78.9629], 5);
                
                // Add OpenStreetMap tiles
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: ' OpenStreetMap contributors'
                }).addTo(map);
                
                // Add geocoder control for search
                const geocoder = L.Control.geocoder({
                    defaultMarkGeocode: false,
                    placeholder: 'Search for a location...',
                    errorMessage: 'Location not found.',
                    showResultIcons: true,
                    suggestMinLength: 2,
                    suggestTimeout: 250,
                    queryMinLength: 1
                }).on('markgeocode', function(e) {
                    const bbox = e.geocode.bbox;
                    const poly = L.polygon([
                        bbox.getSouthEast(),
                        bbox.getNorthEast(),
                        bbox.getNorthWest(),
                        bbox.getSouthWest()
                    ]);
                    map.fitBounds(poly.getBounds());
                    
                    const lat = e.geocode.center.lat;
                    const lng = e.geocode.center.lng;
                    updateMapMarker(lat, lng);
                }).addTo(map);
                
                // Add click event to map
                map.on('click', function(e) {
                    updateMapMarker(e.latlng.lat, e.latlng.lng);
                });
                
                // Try to get current location
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        function(position) {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;
                            map.setView([lat, lng], 13);
                            updateMapMarker(lat, lng);
                        },
                        function(error) {
                            console.log("Could not get current location:", error);
                        }
                    );
                }
            }
            
            // Refresh map size
            setTimeout(() => {
                map.invalidateSize();
            }, 100);
        }

        function updateMapMarker(lat, lng) {
            selectedLat = lat;
            selectedLng = lng;
            
            if (marker) {
                marker.remove();
            }
            
            marker = L.marker([lat, lng]).addTo(map);
            marker.bindPopup(`<b>Selected Location</b><br>Lat: ${lat.toFixed(4)}<br>Lng: ${lng.toFixed(4)}`).openPopup();
        }

        function confirmMapLocation() {
            if (selectedLat && selectedLng) {
                // Set latitude
                document.getElementById('latitude').value = 'custom';
                document.getElementById('latitude-custom').classList.remove('hidden');
                document.getElementById('latitude-custom').value = selectedLat.toFixed(4);
                
                // Set longitude
                document.getElementById('longitude').value = 'custom';
                document.getElementById('longitude-custom').classList.remove('hidden');
                document.getElementById('longitude-custom').value = selectedLng.toFixed(4);
                
                // Get altitude for this location
                getAltitudeFromCoords(selectedLat, selectedLng);
                
                // Hide map
                hideMap();
                
                alert(`📍 Location confirmed!\nLatitude: ${selectedLat.toFixed(4)}\nLongitude: ${selectedLng.toFixed(4)}`);
            } else {
                alert("Please select a location on the map first.");
            }
        }

        function hideMap() {
            document.getElementById('map-container').classList.add('hidden');
        }

        function getAltitude() {
            // Get current coordinates first
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const alt = position.coords.altitude;
                        
                        if (alt !== null) {
                            // Use GPS altitude if available
                            document.getElementById('altitude').value = 'custom';
                            document.getElementById('altitude-custom').classList.remove('hidden');
                            document.getElementById('altitude-custom').value = alt.toFixed(1);
                            alert(`🏔️ GPS Altitude: ${alt.toFixed(1)} meters`);
                        } else {
                            // Get altitude from API
                            getAltitudeFromCoords(lat, lon);
                        }
                    },
                    function(error) {
                        alert("Unable to get location for altitude detection.");
                    }
                );
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        function getAltitudeFromCoords(lat, lon) {
            // Use Open Elevation API to get altitude
            fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lon}`)
                .then(response => response.json())
                .then(data => {
                    if (data.results && data.results.length > 0) {
                        const altitude = data.results[0].elevation;
                        document.getElementById('altitude').value = 'custom';
                        document.getElementById('altitude-custom').classList.remove('hidden');
                        document.getElementById('altitude-custom').value = altitude.toFixed(1);
                    }
                })
                .catch(error => {
                    console.log("Could not get altitude from API:", error);
                });
        }

        // Load existing setup data when page loads
        function loadExistingSetup() {
            fetch('/api/setup/active')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success' && data.configuration) {
                        populateForm(data.configuration.config_data);
                        console.log('Existing setup loaded:', data.configuration);
                        
                        // Show notification to user
                        showNotification(' Your previous setup has been loaded! You can modify any settings and submit again.', 'success');
                    } else {
                        console.log('No existing setup found, starting fresh');
                        // Automatically populate defaults when no existing data
                        populateDefaults();
                    }
                })
                .catch(error => {
                    console.log('Error loading existing setup:', error);
                    // Automatically populate defaults on error
                    populateDefaults();
                });
        }

        // Show notification message
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 p-4 rounded-lg shadow-lg z-50 transition-all duration-300 ${
                type === 'success' ? 'bg-green-500 text-white' :
                type === 'warning' ? 'bg-yellow-500 text-white' :
                type === 'error' ? 'bg-red-500 text-white' :
                'bg-blue-500 text-white'
            }`;
            notification.innerHTML = `
                <div class="flex items-center">
                    <span class="mr-2">${message}</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="ml-4 text-white hover:text-gray-200">&times;</button>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                if (notification.parentElement) {
                    notification.remove();
                }
            }, 5000);
        }

        // Populate form with existing data
        function populateForm(configData) {
            try {
                // Location data
                if (configData.location) {
                    const loc = configData.location;
                    if (loc.latitude) {
                        // Check if latitude matches any predefined option
                        const latSelect = document.getElementById('latitude');
                        const latOptions = Array.from(latSelect.options).map(opt => opt.value);
                        if (latOptions.includes(loc.latitude)) {
                            latSelect.value = loc.latitude;
                        } else {
                            latSelect.value = 'custom';
                            document.getElementById('latitude-custom').value = loc.latitude;
                            document.getElementById('latitude-custom').classList.remove('hidden');
                        }
                    }
                    if (loc.longitude) {
                        // Check if longitude matches any predefined option
                        const lngSelect = document.getElementById('longitude');
                        const lngOptions = Array.from(lngSelect.options).map(opt => opt.value);
                        if (lngOptions.includes(loc.longitude)) {
                            lngSelect.value = loc.longitude;
                        } else {
                            lngSelect.value = 'custom';
                            document.getElementById('longitude-custom').value = loc.longitude;
                            document.getElementById('longitude-custom').classList.remove('hidden');
                        }
                    }
                    if (loc.altitude) {
                        // Check if altitude matches any predefined option
                        const altSelect = document.getElementById('altitude');
                        const altOptions = Array.from(altSelect.options).map(opt => opt.value);
                        if (altOptions.includes(loc.altitude)) {
                            altSelect.value = loc.altitude;
                        } else {
                            altSelect.value = 'custom';
                            document.getElementById('altitude-custom').value = loc.altitude;
                            document.getElementById('altitude-custom').classList.remove('hidden');
                        }
                    }
                    if (loc.installation_type) document.getElementById('installation_type').value = loc.installation_type;
                    if (loc.terrain_type) document.getElementById('terrain_type').value = loc.terrain_type;
                }

                // Solar data
                if (configData.solar) {
                    const solar = configData.solar;
                    if (solar.panel_model) document.getElementById('panel_model').value = solar.panel_model;
                    if (solar.panel_count) document.getElementById('panel_count').value = solar.panel_count;
                    if (solar.panel_power) document.getElementById('panel_power').value = solar.panel_power;
                    if (solar.panel_efficiency) document.getElementById('panel_efficiency').value = solar.panel_efficiency;
                    if (solar.tilt_angle) document.getElementById('tilt_angle').value = solar.tilt_angle;
                    if (solar.azimuth_angle) document.getElementById('azimuth_angle').value = solar.azimuth_angle;
                    if (solar.installation_type) document.getElementById('solar_installation').value = solar.installation_type;
                    if (solar.inverter_efficiency) document.getElementById('inverter_efficiency').value = solar.inverter_efficiency;
                    if (solar.system_loss) document.getElementById('system_loss').value = solar.system_loss;
                    if (solar.shading_factor) document.getElementById('shading_factor').value = solar.shading_factor;
                }

                // Wind data
                if (configData.wind) {
                    const wind = configData.wind;
                    if (wind.turbine_model) document.getElementById('turbine_model').value = wind.turbine_model;
                    if (wind.turbine_count) document.getElementById('turbine_count').value = wind.turbine_count;
                    if (wind.rated_power) document.getElementById('rated_power').value = wind.rated_power;
                    if (wind.cut_in_speed) document.getElementById('cut_in_speed').value = wind.cut_in_speed;
                    if (wind.cut_out_speed) document.getElementById('cut_out_speed').value = wind.cut_out_speed;
                    if (wind.hub_height) document.getElementById('hub_height').value = wind.hub_height;
                    if (wind.rotor_diameter) document.getElementById('rotor_diameter').value = wind.rotor_diameter;
                    if (wind.turbine_efficiency) document.getElementById('turbine_efficiency').value = wind.turbine_efficiency;
                }

                // Battery data
                if (configData.battery) {
                    const battery = configData.battery;
                    if (battery.battery_capacity) document.getElementById('battery_capacity').value = battery.battery_capacity;
                    if (battery.battery_voltage) document.getElementById('battery_voltage').value = battery.battery_voltage;
                    if (battery.charge_efficiency) document.getElementById('charge_efficiency').value = battery.charge_efficiency;
                    if (battery.discharge_efficiency) document.getElementById('discharge_efficiency').value = battery.discharge_efficiency;
                    if (battery.max_discharge_rate) document.getElementById('max_discharge_rate').value = battery.max_discharge_rate;
                }

                // Consumption data
                if (configData.consumption) {
                    const consumption = configData.consumption;
                    if (consumption.daily_energy_usage) document.getElementById('daily_energy_usage').value = consumption.daily_energy_usage;
                    if (consumption.peak_load) document.getElementById('peak_load').value = consumption.peak_load;
                    if (consumption.critical_load) document.getElementById('critical_load').value = consumption.critical_load;
                    if (consumption.load_profile_type) document.getElementById('load_profile_type').value = consumption.load_profile_type;
                }

                console.log('Form populated with existing data');
            } catch (error) {
                console.error('Error populating form:', error);
            }
        }

        // Load existing setup when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadExistingSetup();
        });

        // Function to populate default data
        function populateDefaults() {
            const defaults = {
                location: {
                    latitude: "28.6139",
                    longitude: "77.2090",
                    altitude: "216",
                    installation_type: "rooftop",
                    terrain_type: "urban"
                },
                solar: {
                    panel_model: "monocrystalline",
                    panel_count: "20",
                    panel_power: "400",
                    panel_efficiency: "20",
                    tilt_angle: "30",
                    azimuth_angle: "180",
                    installation_type: "fixed",
                    inverter_efficiency: "95",
                    system_loss: "10",
                    shading_factor: "10"
                },
                wind: {
                    turbine_model: "small_hawt",
                    turbine_count: "2",
                    rated_power: "5000",
                    cut_in_speed: "3",
                    cut_out_speed: "25",
                    hub_height: "30",
                    rotor_diameter: "10",
                    turbine_efficiency: "35"
                },
                battery: {
                    battery_capacity: "10",
                    battery_voltage: "48",
                    charge_efficiency: "95",
                    discharge_efficiency: "95",
                    max_discharge_rate: "5"
                },
                consumption: {
                    daily_energy_usage: "30",
                    peak_load: "5",
                    critical_load: "2",
                    load_profile_type: "residential"
                }
            };

            populateForm(defaults);
            showNotification('✅ Default data loaded! You can modify any settings before submitting.', 'success');
        }
    </script>
</body>
</html>
